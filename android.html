<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailscale Android</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f7;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 16px;
}

.card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

h1 { font-size: 22px; }
h2 { font-size: 18px; }

.warning {
    background: #fff4d6;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
}

.step {
    margin: 8px 0;
    font-size: 15px;
}

.button {
    display: block;
    text-align: center;
    background: linear-gradient(135deg, #4f7cff, #6fa3ff);
    color: #fff;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    margin-top: 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>🤖 Установка Tailscale (Android)</h1>

<div class="warning">
❗ Делайте строго по шагам
</div>
</div>

<div class="card">
<h2>📌 ШАГ 1. Скачать и установить</h2>

<div class="step">1. Нажмите кнопку ниже</div>
<div class="step">2. Скачайте APK</div>
<div class="step">3. Установите приложение</div>

<a class="button" href="https://pkgs.tailscale.com/stable" target="_blank">
📲 Скачать Tailscale (Android)
</a>

</div>

<div class="card">
<h2>📌 ШАГ 2. Подключение</h2>

<div class="step">Далее следуйте инструкции по шагам ниже 👇</div>

</div>

</div>

</body>
</html>
